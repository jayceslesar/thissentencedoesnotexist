<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>world wide well of words</title>
<style>
  :root{
    --bg:#ffffff;
    --ink:#1a1a24;
    --muted:#7a7a8c;
    --line:#d9d9e3;
    --accent:#2a2a91;        /* classic web blue (win/default) */
    --accent-2:#6a0dad;      /* purple (already-said) */
    --link:#1a1ac9;          /* 90s result-link blue */
    --visited:#6a0dad;       /* 90s visited purple */
    --metagreen:#1a7a3a;     /* result "url" green */
    --face:#d4d0c8;          /* win98 button face */
    --web:Verdana,Geneva,Tahoma,sans-serif;
    --serif:Georgia,"Times New Roman",Times,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--web);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  main{
    min-height:calc(100vh - 42px);min-width:0;padding:34px 24px 0;
    display:grid;grid-template-rows:auto auto auto;align-content:start;row-gap:10px;
  }
  .zone{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 0;min-height:0}
  .zone.mid{border-top:1px solid var(--line);border-bottom:1px solid var(--line)}

  /* ---------- TOP THIRD: logo + search ---------- */
  .logo{font-family:var(--serif);font-weight:700;font-size:clamp(30px,5vw,46px);letter-spacing:-1px;line-height:1.1;margin-bottom:6px}
  .logo .w0{color:#1a3fd6}
  .logo .w1{color:#5b2fe0}
  .logo .w2{color:#9b2fb5}
  .logo .w3{color:#2a2a91}
  .logo .w4{color:#7a3ff0}
  .tagline{font-family:var(--serif);font-style:italic;font-size:clamp(14px,2vw,17px);color:var(--muted);margin-bottom:22px}

  form{width:100%;max-width:600px}
  .name-row{margin-top:14px;font-size:13px;color:var(--muted)}
  .name-row label{margin-right:8px}
  .name{
    background:#fff;border:2px inset var(--face);font-family:var(--web);
    font-size:14px;color:var(--ink);text-align:left;padding:5px 8px;width:230px;outline:none;
  }
  .name:focus{outline:1px dotted var(--accent)}

  .searchbar{display:flex;justify-content:center}
  #sentence{
    flex:0 1 540px;background:#fff;border:2px inset var(--face);
    font-family:var(--web);font-size:16px;color:var(--ink);padding:9px 12px;outline:none;
  }
  #sentence:focus{outline:1px dotted var(--accent)}

  .btns{display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .btn98{
    border:2px outset var(--face);background:var(--face);color:#222;
    font-family:var(--web);font-size:13px;padding:6px 16px;cursor:pointer;
  }
  .btn98:active{border-style:inset}
  .btn98:disabled{color:#8a8a8a;cursor:default}
  .zone.bot{ margin-top:100px; }

  /* ---------- MIDDLE THIRD: recent feed -> stats ---------- */
  .panel{width:100%;max-width:680px;display:flex;flex-direction:column;min-height:0;height:100%}
  .panel-head{
    font-family:var(--web);font-size:11px;letter-spacing:.5px;text-transform:uppercase;
    color:var(--muted);text-align:left;padding:0 2px 8px;border-bottom:1px solid var(--line);margin-bottom:6px;flex:0 0 auto;
  }
  .panel-head .blink{color:var(--metagreen)}

  /* scrolling recent-submissions ticker, styled like old search results */
  .ticker{position:relative;overflow:hidden;flex:1 1 auto;min-height:120px;text-align:left;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 12%,#000 88%,transparent);
            mask-image:linear-gradient(180deg,transparent,#000 12%,#000 88%,transparent);}
  .ticker-track{position:absolute;left:0;right:0;top:0;animation:scrollup 32s linear infinite}
  .ticker:hover .ticker-track{animation-play-state:paused}
  @keyframes scrollup{from{transform:translateY(0)}to{transform:translateY(-50%)}}
  .result{padding:9px 6px;border-bottom:1px dotted var(--line)}
  .result .r-link{color:var(--link);font-size:16px;text-decoration:underline;cursor:pointer;font-family:var(--serif)}
  .result .r-link:hover{color:#d00}
  .result .r-link.seen{color:var(--visited)}
  .result .r-meta{color:var(--metagreen);font-size:12px;margin-top:2px}
  .result .r-meta b{color:var(--muted);font-weight:400}

  .stats{display:flex;gap:56px;flex-wrap:wrap;justify-content:center;align-items:flex-start;flex:1 1 auto;align-content:center}
  .stat .num{font-family:var(--serif);font-size:60px;font-weight:700;line-height:1;color:var(--accent)}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:12px;max-width:170px;letter-spacing:.3px}
  .muted{color:var(--muted);font-size:14px;align-self:center;flex:1 1 auto;display:flex;align-items:center;justify-content:center}

  /* ---------- BOTTOM THIRD: verdict / quip ---------- */
  .verdict{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  .quip{font-family:var(--serif);font-size:23px;line-height:1.4;color:var(--ink);max-width:600px}
  .hint{color:var(--muted);font-size:12px;font-style:italic}
  .marquee-tip{color:var(--muted);font-size:12px}

  /* ---------- TOP BANNER ---------- */
  .banner{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    height:42px;padding:0 16px;background:var(--face);
    border-bottom:2px outset var(--face);font-family:var(--web);
  }
  .banner-name{
    flex:0 0 auto;font-family:var(--serif);font-weight:700;font-size:17px;
    color:var(--accent);letter-spacing:-.3px;white-space:nowrap;
  }
  .banner-welcome{
    flex:1 1 auto;min-width:0;text-align:center;
    font-family:var(--serif);font-style:italic;font-size:12px;color:var(--muted);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .banner-count{
    flex:0 0 auto;display:flex;align-items:center;gap:7px;white-space:nowrap;
    font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  }
  .counter{
    font-family:"Courier New",monospace;font-size:14px;font-weight:700;
    background:#000;color:#37ff6b;border:2px inset var(--face);
    padding:1px 7px;letter-spacing:2px;
  }
  @media (max-width:560px){ .banner-welcome{display:none} }

  /* ---------- SIDE RAILS ---------- */
  .layout{
    min-height:calc(100vh - 42px);margin:0 auto;
    display:grid;grid-template-columns:minmax(170px,215px) minmax(0,660px) minmax(170px,215px);
    justify-content:center;column-gap:10px;
  }
  .rail{height:calc(100vh - 42px);position:sticky;top:0;padding:22px 14px;min-width:0;
    display:flex;flex-direction:column;justify-content:center}
  .rail-box{border:2px outset var(--face);background:#fff;display:flex;flex-direction:column;overflow:hidden}
  /* left leaderboard: fill the full rail height, same as the scroller */
  .rail-left .rail-box{flex:1 1 auto;min-height:0;margin:6px 0}
  /* right scroller: fill the rail's full height so it scrolls like the middle feed */
  .rail-right .rail-box{flex:1 1 auto;min-height:0;margin:6px 0}
  .rail-head{
    flex:0 0 auto;background:var(--accent);color:#fff;font-family:var(--web);
    font-size:12px;font-weight:700;letter-spacing:.5px;padding:5px 9px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .rail-head .dot{width:9px;height:9px;background:#fff;border:1px solid rgba(255,255,255,.55)}

  /* left rail: leaderboard */
  .board{list-style:none;margin:0;padding:6px 8px;overflow:auto}
  .board li{display:flex;align-items:baseline;gap:8px;padding:6px 3px;border-bottom:1px dotted var(--line);font-size:13px}
  .board li:last-child{border-bottom:none}
  .board .rank{flex:0 0 auto;width:1.5em;text-align:right;font-family:var(--serif);font-weight:700;font-size:15px;color:var(--muted)}
  .board .r1{color:#c8a21a}.board .r2{color:#8a8a97}.board .r3{color:#a4622a}
  .board .who{flex:1 1 auto;color:var(--link);text-decoration:underline;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board .score{flex:0 0 auto;color:var(--metagreen);font-size:12px;font-variant-numeric:tabular-nums}
  .board .score b{color:var(--muted);font-weight:400}

  /* right rail: random-originals scroller (reuses @keyframes scrollup) */
  .scroller{position:relative;overflow:hidden;flex:1 1 auto;min-height:0;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 8%,#000 92%,transparent);
            mask-image:linear-gradient(180deg,transparent,#000 8%,#000 92%,transparent)}
  .scroller-track{position:absolute;left:0;right:0;top:0;animation:scrollup 46s linear infinite}
  .scroller:hover .scroller-track{animation-play-state:paused}
  .s-item{padding:9px 9px;border-bottom:1px dotted var(--line)}
  .s-item .s-link{display:block;font-family:var(--serif);font-size:14px;line-height:1.35;color:var(--link);text-decoration:underline;cursor:pointer}
  .s-item .s-link:hover{color:#d00}
  .s-item .s-link.seen{color:var(--visited)}
  .s-item .s-who{display:block;color:var(--metagreen);font-size:11px;margin-top:3px}

  /* rails are decorative side matter — drop them when there's no room */
  @media (max-width:880px){
    .layout{grid-template-columns:minmax(0,720px)}
    .rail{display:none}
  }

  /* ---------- STATE TINTS ---------- */
  body.state-lose{--accent:var(--accent-2)}
</style>
</head>
<body>
  <header class="banner">
    <div class="banner-name">welcome to the world wide well of words!</div>
    <div class="banner-welcome">go on, say something never said since seasons began </div>
    <div class="banner-count">total tales told<span class="counter" id="subcount">&mdash;</span></div>
  </header>
  <div class="layout">
    <!-- LEFT RAIL: leaderboard -->
    <aside class="rail rail-left">
      <div class="rail-box">
        <div class="rail-head"><span>&#9733; Hall of Fame</span><span class="dot"></span></div>
        <ol class="board" id="leaderboard"></ol>
      </div>
    </aside>

  <main>
    <!-- TOP THIRD -->
    <section class="zone top">
      <div class="logo">
        <span class="w0">Has</span> <span class="w1">anyone</span> <span class="w2">ever</span>
        <span class="w3">said...</span>
      </div>
      <form id="form">
        <div class="searchbar">
          <input id="sentence" autocomplete="off" placeholder="words to be written down in history&hellip;" required />
        </div>
        <div class="name-row">
          <label for="username">author:</label>
          <input id="username" class="name" autocomplete="off" placeholder="your pen name?" />
        </div>
        <div class="btns">
          <button id="submit" class="btn98" type="submit">wager dignity</button>
        </div>
      </form>
    </section>

    <!-- Reply Block-->
    <section class="zone bot">
      <div class="answer" id="answer">
        <div class="marquee-tip">Tip: click any sentence above to borrow it &mdash; if you dare.</div>
      </div>
    </section>

    <!-- Result stats block-->
    <section class="zone mid">
      <div class="stats" id="stats"></div>
    </section>
  </main>


    <!-- RIGHT RAIL: random originals scroller -->
    <aside class="rail rail-right">
      <div class="rail-box">
        <div class="rail-head"><span>Random Originals</span><span class="dot"></span></div>
        <div class="scroller" id="scroller"></div>
      </div>
    </aside>
  </div>

  <script src="app.js?v=3"></script>
  <script>renderThirds({ idleFeed:false, labels:{ win:"original", lose:"already said" } });</script>
</body>
</html>
