# Brings up the Litestar app (API + static UI) and its Postgres database.
#
# NOTE: uses host networking (network_mode: host) instead of a bridge network.
# On Podman 3.4.4 under WSL2, creating a bridge network triggers a broken
# iptables->nftables NAT path and fails. Host networking skips bridge creation
# entirely, so it works without upgrading Podman or touching iptables.
#
# Consequence: no isolated network / no inter-container DNS. Both containers
# share the host's network namespace, so they reach each other over localhost
# and bind their ports directly on the host (5432 for Postgres, 8000 for the
# app). Make sure nothing else on the host is already using those ports.
#
# app.py reads its DB settings from env vars, all set here (it does not load a
# .env itself).
services:
  db:
    image: postgres:16
    network_mode: host
    environment:
      POSTGRES_USER: sentences
      POSTGRES_PASSWORD: sentences
      POSTGRES_DB: db            # app.py's db_uri hardcodes /db, so keep this "db"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build: .
    network_mode: host
    # depends_on with a health condition is ignored by Podman 3.4.4, so the app
    # can start before Postgres is ready. restart makes it retry until the DB is
    # up instead of dying on the first connection error.
    restart: on-failure
    environment:
      # Host networking -> Postgres is reachable on localhost:5432.
      HOST: localhost
      PORT: 5432
      USER: sentences
      PASSWORD: sentences
      DATABASE: db
    depends_on:
      - db

volumes:
  pgdata:
